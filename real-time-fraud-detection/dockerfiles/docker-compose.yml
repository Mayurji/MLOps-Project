version: "3.8"
services:
  kafka:
    image: apache/kafka:3.9.2 #kraft mode
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1 # Kafka broker ID
      KAFKA_PROCESS_ROLES: broker,controller # Kafka broker and controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093 # Kafka listeners
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092 # Kafka advertised listeners
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER # Kafka controller listeners
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT # Kafka listener security protocol map
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093 # Kafka controller quorum voters
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # Kafka offsets topic replication factor
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # Kafka auto create topics

    volumes:
      - kafka_data:/var/lib/kafka/data
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root file:///mlflow/artifacts --host 0.0.0.0
    volumes:
      - ./mlflow:/mlflow
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - kafka
  # producer:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.producer
  #   depends_on:
  #     - kafka

  # consumer:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.consumer
  #   depends_on:
  #     - kafka

volumes:
  kafka_data:
  mlflow_data:
